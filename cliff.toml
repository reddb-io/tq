# git-cliff configuration — drives the release-notes block in each
# GitHub Release published by .github/workflows/release.yml.
# Adapted from reddb's cliff.toml (ADR 0003).
#
# Conventions in this repo:
#   - Conventional commits with scopes: `feat(toon):`, `fix(tq):`, …
#   - Merge commits and `chore:` housekeeping are filtered out.

[changelog]
header = ""
trim = true
footer = ""

# Body is rendered with Tera. `commits` here are only the commits the
# `commit_parsers` below classified into a group — filtered ones are
# already gone.
body = """
{% if version -%}
## What's in {{ version | trim_start_matches(pat="v") }}
{% else -%}
## Unreleased
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}

{% for commit in commits -%}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | split(pat="\n") | first | trim }}
{% endfor %}
{% endfor -%}
{% if previous and previous.version %}
**Full Changelog**: https://github.com/reddb-io/tq/compare/{{ previous.version }}...{{ version }}
{% endif %}
"""

[git]
# Use full commit messages so BREAKING CHANGE footers are visible.
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = []

# Order: more-specific patterns first (BREAKING, then feat/fix/etc).
# Anything that doesn't match is dropped — chores, plain merges, and
# other noise never reach the changelog.
commit_parsers = [
  { message = "^[a-z]+(\\([^)]+\\))?!:", group = "⚠ Breaking changes" },
  { body = "(?m)^BREAKING CHANGE:", group = "⚠ Breaking changes" },
  { message = "^feat", group = "🚀 Features" },
  { message = "^fix", group = "🐛 Bug fixes" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^refactor", group = "🔧 Refactor" },
  { message = "^docs", group = "📚 Documentation" },
  { message = "^test", group = "🧪 Tests" },
  { message = "^build|^ci\\(release\\)", group = "🏗 Build & CI" },
  # Drop everything else (chore, style, plain merge, …).
  { message = ".*", skip = true },
]
