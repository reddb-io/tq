name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  cargo:
    name: Cargo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Check source file length
        run: scripts/check-file-length.sh
      - name: Check formatting
        run: cargo fmt --check
      - name: Lint
        run: cargo clippy --workspace -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Coverage
        run: cargo llvm-cov --workspace --fail-under-lines 95

  node:
    name: Node
    runs-on: ubuntu-latest
    steps:
      # The JS conformance suite reads the official fixtures straight from the
      # spec submodule, exactly as the Rust harness does.
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Check source file length
        run: scripts/check-file-length.sh
      - name: Test
        run: pnpm -r test
