name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  cargo:
    name: Cargo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --check
      - name: Lint
        run: cargo clippy --workspace -- -D warnings
      - name: Test
        run: cargo test --workspace
