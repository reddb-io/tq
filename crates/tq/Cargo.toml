[package]
name = "reddb-io-tq"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[[bin]]
name = "tq"
path = "src/main.rs"

[[test]]
name = "golden"
path = "../../tests/tq/golden.rs"

[dependencies]
reddb-io-toon = { path = "../toon" }
regex = "1"
serde_json = { version = "1", features = ["preserve_order"] }
